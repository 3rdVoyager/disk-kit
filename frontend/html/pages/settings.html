<section class="settings-page">
  <div class="settings-header">
    <h2>Settings</h2>
    <p>Configure Disk Kit preferences</p>
  </div>

  <form id="settings-form">
    <!-- General -->
    <div class="settings-section">
      <h3>General</h3>
      <div class="form-group">
        <label for="theme">Theme</label>
        <select id="theme" name="general.theme">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <div class="form-group">
        <label for="defaultPath">Default Path</label>
        <input type="text" id="defaultPath" name="general.defaultPath" value="C:/Users" />
      </div>
    </div>

    <!-- Security -->
    <div class="settings-section">
      <h3>Security</h3>
      <div class="form-group">
        <label for="blockedPaths">Blocked paths (one per line)</label>
        <textarea id="blockedPaths" rows="5"
          placeholder="C:/Users/you/AppData&#10;C:/Users/you/Documents/Vault"></textarea>
        <p class="form-hint">Files in these folders cannot be browsed, scanned, or moved to the Recycle Bin.</p>
      </div>
    </div>

    <div class="settings-actions">
      <button type="submit" class="btn-primary">Save Settings</button>
      <button type="button" id="reset-settings" class="btn-secondary">Reset to Defaults</button>
      <span id="settings-message" class="settings-message"></span>
    </div>
  </form>
</section>
