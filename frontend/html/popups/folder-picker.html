<div id="folder-picker-dialog" class="dialog-overlay" style="display: none;">
  <div class="dialog-content folder-picker-content">
    <div class="dialog-header">
      <h2>Select Path</h2>
      <button class="dialog-close" id="folder-picker-close" type="button">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>
    <div class="dialog-body">
      <div class="folder-picker-ui">
        <div class="folder-picker-nav">
          <button class="btn-icon" id="folder-picker-back" title="Back" type="button"><span class="material-symbols-rounded">arrow_back</span></button>
          <div class="folder-picker-breadcrumb">This PC</div>
        </div>
        <div class="folder-picker-list-container">
          <ul id="folder-picker-file-list" class="file-list"></ul>
        </div>
      </div>
    </div>
    <div class="dialog-footer">
      <div class="selected-path-display">
        <span class="label">Selected:</span>
        <span id="folder-picker-current-path">C:/Users</span>
      </div>
      <div class="footer-actions">
        <button class="btn-secondary" id="folder-picker-cancel" type="button">Cancel</button>
        <button class="btn-primary" id="folder-picker-confirm" type="button">Select Folder</button>
      </div>
    </div>
  </div>
</div>
