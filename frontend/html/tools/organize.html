<section class="tool-page">
  <div class="tool-page-header">
    <h2>Smart Organize</h2>
    <p>Sort files into category folders (Images, Videos, Documents, etc.).</p>
  </div>

  <form id="smart-organize-form" class="tool-form">
    <div class="tool-form-row">
      <label for="organize-path">Path</label>
      <div class="input-group">
        <input id="organize-path" type="text" placeholder="Leave empty to use default path" />
        <button type="button" class="btn-browse" id="organize-browse" title="Browse...">
          <span class="material-symbols-rounded">folder_open</span>
        </button>
      </div>
    </div>
    <div class="tool-form-actions">
      <button type="button" class="btn-secondary" id="organize-preview-btn">Preview</button>
      <button type="submit" class="btn-primary">Apply Organize</button>
    </div>
  </form>

  <div id="organize-summary" class="tool-summary"></div>
  <div id="organize-results" class="tool-results"></div>
</section>
