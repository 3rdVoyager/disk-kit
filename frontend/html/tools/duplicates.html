<section class="tool-page duplicates-page">
  <div class="tool-page-header">
    <h2>Duplicate Finder</h2>
    <p>Find exact duplicate files using size + SHA-256 hash.</p>
  </div>

  <form id="duplicates-form" class="convert-form">
    <div class="tool-workspace">
      <nav class="tool-step-nav" role="tablist" aria-label="Scan steps">
        <button type="button" class="tool-step-tab active" role="tab" aria-selected="true" data-step="location">Location</button>
        <button type="button" class="tool-step-tab" role="tab" aria-selected="false" data-step="filters">Filters</button>
      </nav>

      <div class="tool-step-panels">
        <div class="tool-step-panel active" data-step="location" role="tabpanel">
          <h3 class="tool-panel-title">Scan location</h3>
          <p class="tool-panel-desc">Folder to search for duplicate files. Leave empty to use your default path.</p>
          <div class="convert-field convert-field-full">
            <label for="duplicates-path">Folder</label>
            <div class="input-group">
              <input id="duplicates-path" type="text" placeholder="Leave empty to use default path" />
              <button type="button" class="btn-browse" id="duplicates-browse" title="Browse...">
                <span class="material-symbols-rounded">folder_open</span>
              </button>
            </div>
          </div>
        </div>

        <div class="tool-step-panel" data-step="filters" role="tabpanel" hidden>
          <h3 class="tool-panel-title">Scan filters</h3>
          <p class="tool-panel-desc">Ignore small files and cap how many duplicate groups are returned.</p>
          <div class="convert-field-grid">
            <div class="convert-field">
              <label for="duplicates-min-size">Min size (MB)</label>
              <input id="duplicates-min-size" type="number" min="1" value="1" />
            </div>
            <div class="convert-field">
              <label for="duplicates-limit">Group limit</label>
              <input id="duplicates-limit" type="number" min="1" value="200" />
            </div>
          </div>
        </div>
      </div>

      <div class="tool-form-footer convert-actions">
        <button type="button" class="btn-secondary tool-step-back" hidden>Back</button>
        <div class="tool-form-footer-end">
          <button type="button" class="btn-primary tool-step-next">Next</button>
          <div class="tool-step-final-actions" hidden>
            <button type="submit" class="btn-primary">Find Duplicates</button>
          </div>
        </div>
      </div>
    </div>
  </form>

  <div id="duplicates-summary" class="tool-summary"></div>
  <div id="duplicates-results" class="tool-results"></div>
</section>
